name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 升级了版本
      - name: Setup Node.js
        uses: actions/setup-node@v4 # 升级了版本
        with:
          node-version: '22' # 适配最新的 Node 版本

      - name: Install dependencies
        run: npm install --legacy-peer-deps # 强制解决依赖冲突

      - name: Build
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist